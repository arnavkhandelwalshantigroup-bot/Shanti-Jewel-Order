<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shanti Jewel Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital@1&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --gold: #D4AF37; --brown: #5d4037; --bg: #f4f7f6; --red: #d32f2f; --grey: #e0e0e0; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding-bottom: 90px; color: #333; }
        
        /* Large Header */
        .header { background: var(--brown); color: white; text-align: center; padding: 15px; border-bottom: 3px solid var(--gold); }
        .logo-text { font-size: 24px; font-weight: bold; letter-spacing: 2px; }
        
        /* Navigation Tabs (Big & Clear) */
        .tab-bar { position: fixed; bottom: 0; width: 100%; background: white; display: flex; border-top: 1px solid #ddd; height: 80px; z-index: 1000; }
        .tab { flex: 1; text-align: center; padding: 25px 2px; font-size: 10px; color: #999; font-weight: bold; text-transform: uppercase; }
        .tab.active { color: var(--brown); border-top: 5px solid var(--gold); background: #fffcf5; }

        /* Large Cards for High Visibility */
        .card { background: white; padding: 20px; border-radius: 12px; margin: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border: 1px solid #eee; position: relative; }
        .page { display: none; padding: 10px; }
        .page.active { display: block; }

        /* Form Overlay */
        #previewOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 10001; overflow-y: auto; padding: 20px 0; text-align: center; }
        
        /* Timeline */
        .timeline-container { margin: 25px 0 15px 0; position: relative; display: flex; justify-content: space-between; align-items: center; }
        .timeline-line { position: absolute; top: 50%; left: 0; height: 3px; background: var(--grey); width: 100%; transform: translateY(-50%); z-index: 1; }
        .timeline-progress { position: absolute; top: 50%; left: 0; height: 3px; background: var(--gold); z-index: 2; }
        .step { width: 15px; height: 15px; border-radius: 50%; background: var(--grey); border: 3px solid white; z-index: 3; position: relative; }
        .step.done { background: var(--gold); }
        .step-label { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); font-size: 9px; font-weight: bold; }

        /* Dashboard Grid */
        .dash-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 15px; }
        .dash-item { background: var(--brown); color: white; padding: 15px; border-radius: 10px; text-align: center; border-bottom: 4px solid var(--gold); }
        
        /* Buttons */
        .btn { padding: 18px; border: none; border-radius: 10px; font-weight: bold; width: 100%; cursor: pointer; font-size: 16px; }
        .btn-gold { background: var(--gold); color: white; }
        .btn-out { background: none; border: 2px solid var(--gold); color: var(--gold); margin-top: 10px; }
        
        /* Bespoke Canvas Styling */
        #formCanvas { background: white; width: 650px; padding: 40px; position: fixed; left: -5000px; border: 15px solid var(--gold); }
        .bespoke-text { font-family: 'Libre Baskerville', serif; font-size: 26px; color: var(--brown); font-style: italic; }
    </style>
</head>
<body>

<div class="header">
    <div class="logo-text">SHANTI JEWEL</div>
</div>

<!-- Form Preview Overlay -->
<div id="previewOverlay">
    <div style="background: white; display: inline-block; padding: 10px; border-radius: 10px; width: 90%;">
        <img id="finalPreviewImg" style="width: 100%;">
    </div>
    <div style="padding: 20px; display: flex; gap: 10px;">
        <button class="btn" style="background:#555; color:white;" onclick="closePreview()">CLOSE</button>
        <button id="shareBtnAction" class="btn btn-gold">SHARE</button>
    </div>
</div>

<!-- Tabs -->
<div id="punchPage" class="page active">
    <div class="card">
        <input type="text" id="i_id" placeholder="Order ID">
        <select id="i_pa">
            <option value="">Party Name</option>
            <option value="P.N.GADGIL & SONS LTD.">P.N.GADGIL & SONS LTD.</option>
            <option value="PNGS Reva Diamond Jewellery Ltd">PNGS Reva Diamond Jewellery Ltd</option>
            <option value="NEELKANTH JEWELLERS">NEELKANTH JEWELLERS</option>
        </select>
        <input type="number" step="0.001" id="i_wt" placeholder="Weight (gms)">
        <select id="i_kt"><option value="22">22KT</option><option value="18">18KT</option></select>
        <button class="btn btn-gold" onclick="saveOrder()">PUNCH ORDER</button>
    </div>
</div>

<div id="productionPage" class="page"><div id="prodList"></div></div>
<div id="activePage" class="page"><div id="activeList"></div></div>
<div id="pastPage" class="page"><div id="pastList"></div></div>

<div id="dashPage" class="page">
    <div class="dash-grid" id="statusCounts"></div>
    <div class="card" style="text-align:center;">
        <h3 id="dashGross">0.000 GMS</h3>
        <p>TOTAL GROSS WEIGHT</p>
        <button class="btn btn-gold" style="background:red;" onclick="wipeData()">WIPEOUT ALL</button>
    </div>
</div>

<div class="tab-bar">
    <div class="tab active" onclick="nav('punch', this)">PUNCH IN</div>
    <div class="tab" onclick="nav('production', this)">PRODUCTION</div>
    <div class="tab" onclick="nav('active', this)">ACTIVE</div>
    <div class="tab" onclick="nav('past', this)">PAST</div>
    <div class="tab" onclick="nav('dash', this)">DASHBOARD</div>
</div>

<!-- Form Canvas -->
<div id="formCanvas">
    <h1 style="text-align:center; color:var(--brown); letter-spacing:5px;">SHANTI JEWEL</h1>
    <div id="c_imgs" style="display:grid; grid-template-columns: 1fr 1fr; gap:15px;"></div>
    <table style="width:100%; margin-top:30px; font-size:20px;">
        <tr><td>Order ID:</td><td id="c_id" class="bespoke-text"></td></tr>
        <tr><td>Weight:</td><td id="c_wt" class="bespoke-text"></td></tr>
        <tr><td>Purity:</td><td id="c_kt" class="bespoke-text"></td></tr>
    </table>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBnvmQBPkJmJcjXf71vEUY91B2_2P9oAgU", authDomain: "shanti-jewel-order.firebaseapp.com", projectId: "shanti-jewel-order", databaseURL: "https://shanti-jewel-order-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const depts = ["CAD", "CAM", "CASTING", "POLISH", "HUID", "READY"];

    function saveOrder() {
        const id = document.getElementById('i_id').value;
        if(!id) return alert("Enter ID");
        db.ref('orders/' + id).set({
            id: id, party: document.getElementById('i_pa').value,
            weight: document.getElementById('i_wt').value,
            kt: document.getElementById('i_kt').value,
            status: "CAD", ts: Date.now(), imgs: ["https://via.placeholder.com/150"]
        }).then(() => location.reload());
    }

    function loadOrders() {
        db.ref('orders').on('value', s => {
            const data = Object.values(s.val() || {}).sort((a,b) => b.ts - a.ts);
            window.fullData = data;
            renderAll(data);
        });
    }

    function renderAll(data) {
        const pL = document.getElementById('prodList'); const aL = document.getElementById('activeList'); const pastL = document.getElementById('pastList');
        pL.innerHTML = ""; aL.innerHTML = ""; pastL.innerHTML = "";
        let gross = 0;
        data.forEach(o => {
            if(o.status !== "READY") gross += parseFloat(o.weight || 0);
            const html = `
                <div class="card">
                    <b>${o.id}</b> | ${o.party}<br>
                    <div style="margin:15px 0;">${o.status} Process</div>
                    <button class="btn btn-out" onclick="moveNext('${o.id}', '${o.status}')">NEXT PROCESS</button>
                    <button class="btn btn-out" style="color:green; border-color:green;" onclick="viewForm('${o.id}')">SHARE FORM</button>
                </div>`;
            if(o.status === "READY") pastL.innerHTML += html;
            else { pL.innerHTML += html; aL.innerHTML += html; }
        });
        document.getElementById('dashGross').innerText = gross.toFixed(3) + " GMS";
    }

    function moveNext(id, cur) {
        const idx = depts.indexOf(cur);
        if(confirm(`Move Order #${id} to ${depts[idx+1]}?`)) {
            db.ref('orders/' + id).update({ status: depts[idx+1] });
        }
    }

    function viewForm(id) {
        const o = window.fullData.find(x => x.id === id);
        document.getElementById('c_id').innerText = o.id;
        document.getElementById('c_wt').innerText = o.weight + " GMS";
        document.getElementById('c_kt').innerText = o.kt + " KT";
        html2canvas(document.querySelector("#formCanvas")).then(canvas => {
            const img = canvas.toDataURL("image/jpeg");
            document.getElementById('finalPreviewImg').src = img;
            document.getElementById('previewOverlay').style.display = 'block';
            document.getElementById('shareBtnAction').onclick = async () => {
                const blob = await (await fetch(img)).blob();
                const file = new File([blob], 'order.jpg', {type:'image/jpeg'});
                navigator.share({files:[file]}).catch(()=>{});
            };
        });
    }

    function closePreview() { document.getElementById('previewOverlay').style.display = 'none'; }
    function nav(p, el) {
        document.querySelectorAll('.page, .tab').forEach(x => x.classList.remove('active'));
        document.getElementById(p + 'Page').classList.add('active');
        el.classList.add('active');
    }
    function wipeData() { if(confirm("WIPE ALL DATA?")) db.ref('orders').remove(); }
    loadOrders();
</script>
</body>
</html>
