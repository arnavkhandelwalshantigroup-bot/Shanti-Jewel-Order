<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shanti Jewel Order Portal</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --gold: #D4AF37; --brown: #5d4037; --bg: #f4f7f6; --red: #d32f2f; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding-bottom: 90px; color: #333; }
        #loginOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--brown); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; }
        .login-box { background: white; padding: 30px; border-radius: 15px; width: 80%; max-width: 300px; text-align: center; border-bottom: 5px solid var(--gold); }
        .login-box input { width: 100%; padding: 12px; border: 2px solid #ddd; text-align: center; letter-spacing: 8px; font-size: 24px; color: var(--brown); border-radius: 8px; box-sizing: border-box; }
        .header { background: var(--brown); color: white; text-align: center; padding: 10px; border-bottom: 3px solid var(--gold); }
        .logo-text { font-size: 22px; font-weight: bold; letter-spacing: 2px; margin: 0; }
        .sub-header { font-size: 10px; letter-spacing: 4px; color: var(--gold); }
        .shree-text { font-size: 14px; color: var(--gold); margin-bottom: 2px; display: block; }
        .page { display: none; padding: 15px; }
        .page.active { display: block; }
        .card { background: white; padding: 15px; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border: 1px solid #eee; }
        .dash-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .dash-item { background: var(--brown); color: white; padding: 10px; border-radius: 8px; text-align: center; border-bottom: 3px solid var(--gold); }
        .dash-count { font-size: 18px; font-weight: bold; display: block; }
        .dash-label { font-size: 9px; text-transform: uppercase; color: var(--gold); }
        .stats-banner { background: #fff; border: 1px solid var(--gold); border-radius: 8px; padding: 15px; margin-bottom: 20px; display: flex; justify-content: space-around; text-align: center; }
        .stats-banner b { display: block; font-size: 16px; color: var(--brown); }
        input, textarea, select { width: 100%; padding: 14px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .btn { padding: 15px; border: none; border-radius: 8px; font-weight: bold; width: 100%; cursor: pointer; }
        .btn-gold { background: var(--gold); color: white; }
        .btn-red { background: var(--red); color: white; margin-top: 15px; }
        .btn-out { background: none; border: 1px solid var(--gold); color: var(--gold); margin-top: 8px; font-size: 12px; }
        .tab-bar { position: fixed; bottom: 0; width: 100%; background: white; display: flex; border-top: 1px solid #ddd; height: 75px; z-index: 1000; }
        .tab { flex: 1; text-align: center; padding: 25px 5px; font-size: 8px; color: #999; font-weight: bold; text-transform: uppercase; display: flex; align-items: center; justify-content: center; }
        .tab.active { color: var(--brown); border-top: 4px solid var(--brown); background: #fffcf5; }
        .photo-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        .photo-box { height: 100px; background: #f9f9f9; border: 2px dashed #ddd; display: flex; align-items: center; justify-content: center; font-size: 10px; color: #aaa; border-radius: 8px; overflow: hidden; }
        .photo-box img { width: 100%; height: 100%; object-fit: cover; }
        #formCanvas { background: white; width: 650px; padding: 40px; position: fixed; left: -5000px; border: 15px solid var(--gold); box-sizing: border-box; }
        .canvas-header { text-align: center; border-bottom: 5px solid var(--brown); padding-bottom: 20px; margin-bottom: 25px; }
        .canvas-logo { font-size: 50px; font-weight: bold; color: var(--brown); letter-spacing: 6px; margin: 0; }
        .canvas-sub { font-size: 14px; letter-spacing: 5px; color: var(--gold); margin-top: 5px; font-weight: bold; }
        .canvas-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 25px; }
        .canvas-grid img { width: 100%; height: 260px; object-fit: cover; border: 3px solid #eee; border-radius: 10px; }
        .canvas-table { width: 100%; font-size: 24px; border-collapse: collapse; }
        .canvas-table td { padding: 15px 0; border-bottom: 2px solid #f0f0f0; }
    </style>
</head>
<body>

<div id="loginOverlay">
    <div class="login-box">
        <span style="color:var(--gold); font-weight:bold; display:block; margin-bottom:10px;">IIश्रीII</span>
        <h2>APP LOGIN</h2>
        <input type="password" id="passInput" placeholder="••••" maxlength="4">
        <button class="btn btn-gold" style="margin-top:20px;" onclick="checkPass()">ENTER</button>
    </div>
</div>

<div class="header">
    <span class="shree-text">IIश्रीII</span>
    <div class="logo-text">SHANTI JEWEL</div>
    <div class="sub-header">ORDER PORTAL</div>
</div>

<div id="punchPage" class="page active">
    <div class="card">
        <div class="photo-grid">
            <div class="photo-box" id="p1" onclick="document.getElementById('f1').click()">+ PHOTO 1</div>
            <div class="photo-box" id="p2" onclick="document.getElementById('f2').click()">+ PHOTO 2</div>
            <div class="photo-box" id="p3" onclick="document.getElementById('f3').click()">+ PHOTO 3</div>
            <div class="photo-box" id="p4" onclick="document.getElementById('f4').click()">+ PHOTO 4</div>
        </div>
        <input type="file" id="f1" accept="image/*" style="display:none" onchange="handleSingle(this, 'p1', 0)">
        <input type="file" id="f2" accept="image/*" style="display:none" onchange="handleSingle(this, 'p2', 1)">
        <input type="file" id="f3" accept="image/*" style="display:none" onchange="handleSingle(this, 'p3', 2)">
        <input type="file" id="f4" accept="image/*" style="display:none" onchange="handleSingle(this, 'p4', 3)">
        
        <input type="text" id="i_id" placeholder="Order Number">
        <select id="i_pa">
            <option value="">Select Party Name</option>
            <option value="P.N.GADGIL & SONS LTD.">P.N.GADGIL & SONS LTD.</option>
            <option value="PNGS Reva Diamond Jewellery Ltd">PNGS Reva Diamond Jewellery Ltd</option>
            <option value="Shri Gajanan Jewellers">Shri Gajanan Jewellers</option>
            <option value="PNG BROTHERS">PNG BROTHERS</option>
            <option value="ANNAPURNA GOLD">ANNAPURNA GOLD</option>
            <option value="NEELKANTH JEWELLERS">NEELKANTH JEWELLERS</option>
            <option value="INHOUSE">INHOUSE</option>
        </select>
        <select id="i_kt">
            <option value="22">22KT Gold</option>
            <option value="18">18KT Gold</option>
        </select>
        <div style="display:flex; gap:10px;">
            <input type="number" step="0.001" id="i_wt" placeholder="Weight (gms)">
            <input type="number" id="i_sz" placeholder="Size">
        </div>
        <select id="i_cad">
            <option value="">Select CAD Worker</option>
            <option value="DYE">DYE</option>
            <option value="SHINDE">SHINDE</option>
            <option value="ALAUDDIN">ALAUDDIN</option>
        </select>
        <textarea id="i_sp" rows="3" placeholder="Instructions"></textarea>
        <button class="btn btn-gold" onclick="saveOrder()">SAVE & PROCESS</button>
    </div>
</div>

<div id="productionPage" class="page"><div id="prodList"></div></div>
<div id="activePage" class="page">
    <div style="margin-bottom:15px;"><input type="text" id="searchInput" placeholder="🔍 Search Order ID..." onkeyup="filterOrders()"></div>
    <div id="activeList"></div>
</div>
<div id="pastPage" class="page"><div id="pastList"></div></div>

<div id="dashPage" class="page">
    <div id="wipeoutLock" class="card" style="text-align:center; padding: 40px 20px;">
        <h2 style="color:var(--brown);">ADMIN ACCESS</h2>
        <input type="password" id="wipeoutPass" placeholder="••••" maxlength="4" style="width:150px; margin-bottom:15px;">
        <button class="btn btn-gold" onclick="unlockWipeout()">UNLOCK DASHBOARD</button>
    </div>
    
    <div id="wipeoutContent" style="display:none;">
        <div class="stats-banner">
            <div><b id="totalHandWt">0.000</b><span>Gross Hand</span></div>
            <div><b id="totalFineHand">0.000</b><span>Fine Hand</span></div>
        </div>
        <div class="dash-grid" id="statusCounts"></div>
        <div class="card" style="padding:0; overflow:hidden;">
            <table style="width:100%; font-size:11px; background:white; border-collapse:collapse;">
                <thead style="background:var(--brown); color:var(--gold);">
                    <tr><th style="padding:10px; text-align:left;">Party</th><th>Pnd</th><th>Gross</th><th>Fine</th></tr>
                </thead>
                <tbody id="partyStatsBody"></tbody>
            </table>
        </div>
        <button class="btn btn-red" onclick="commitChanges()">WIPEOUT: CLEAR ALL MEMORY</button>
        <button class="btn btn-out" onclick="lockDashboard()" style="margin-top:10px;">EXIT ADMIN</button>
    </div>
</div>

<div id="formCanvas">
    <div class="canvas-header">
        <span style="font-size:24px; color:var(--gold);">IIश्रीII</span>
        <div class="canvas-logo">SHANTI JEWEL</div>
        <div class="canvas-sub">ORDER FORM</div>
    </div>
    <div id="c_imgs" class="canvas-grid"></div>
    <table class="canvas-table">
        <tr><td><b>WEIGHT:</b></td><td id="c_wt"></td></tr>
        <tr><td><b>PURITY:</b></td><td id="c_kt"></td></tr>
        <tr><td><b>SIZE:</b></td><td id="c_sz"></td></tr>
        <tr><td><b>CAD WORKER:</b></td><td id="c_cad"></td></tr>
        <tr><td><b>INSTRUCTION:</b></td><td id="c_sp"></td></tr>
    </table>
</div>

<div class="tab-bar">
    <div class="tab active" onclick="nav('punch', this)">PUNCH IN</div>
    <div class="tab" onclick="nav('production', this)">PRODUCTION</div>
    <div class="tab" onclick="nav('active', this)">ACTIVE</div>
    <div class="tab" onclick="nav('past', this)">PAST ORDERS</div>
    <div class="tab" onclick="nav('dash', this)">DASHBOARD</div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBnvmQBPkJmJcjXf71vEUY91B2_2P9oAgU", authDomain: "shanti-jewel-order.firebaseapp.com", projectId: "shanti-jewel-order", databaseURL: "https://shanti-jewel-order-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const depts = ["CAD", "CAM", "CASTING", "POLISH", "HUID", "READY"];
    let photoData = [null, null, null, null];

    function checkPass() { if(document.getElementById('passInput').value === '1008') { document.getElementById('loginOverlay').style.display = 'none'; loadOrders(); } }
    function unlockWipeout() { if(document.getElementById('wipeoutPass').value === '2215') { document.getElementById('wipeoutLock').style.display = 'none'; document.getElementById('wipeoutContent').style.display = 'block'; } }
    function lockDashboard() { document.getElementById('wipeoutLock').style.display = 'block'; document.getElementById('wipeoutContent').style.display = 'none'; }
    function commitChanges() { if(confirm("CLEAR ALL MEMORY?")) { db.ref('orders').remove().then(() => location.reload()); } }

    async function handleSingle(input, pId, idx) {
        const reader = new FileReader();
        reader.onload = (e) => {
            const img = new Image(); img.src = e.target.result;
            img.onload = () => {
                const canvas = document.createElement('canvas'); canvas.width = 800; canvas.height = 800;
                canvas.getContext('2d').drawImage(img, 0, 0, 800, 800);
                photoData[idx] = canvas.toDataURL("image/jpeg", 0.6);
                document.getElementById(pId).innerHTML = `<img src="${photoData[idx]}">`;
            };
        };
        reader.readAsDataURL(input.files[0]);
    }

    function saveOrder() {
        const id = document.getElementById('i_id').value;
        const valid = photoData.filter(p => p !== null);
        if(!id || valid.length === 0) return alert("ID & Photos Required");
        db.ref('orders/' + id).set({
            id: id, party: document.getElementById('i_pa').value,
            weight: parseFloat(document.getElementById('i_wt').value).toFixed(3),
            kt: document.getElementById('i_kt').value,
            size: document.getElementById('i_sz').value + " NO.",
            status: "CAD", ts: Date.now(), imgs: valid,
            cadWorker: document.getElementById('i_cad').value,
            specs: document.getElementById('i_sp').value
        }).then(() => location.reload());
    }

    function loadOrders() {
        db.ref('orders').on('value', s => {
            const data = Object.values(s.val() || {}).sort((a,b) => b.ts - a.ts);
            window.fullData = data; renderLists(data); calcDash(data);
        });
    }

    function calcDash(data) {
        let gross = 0; let fine = 0; let pC = {};
        let statusCounts = {}; depts.forEach(d => statusCounts[d] = 0);
        data.forEach(o => {
            const wt = parseFloat(o.weight) || 0;
            const itemFine = o.kt === "22" ? wt * 0.92 : wt * 0.76;
            if(o.status !== "READY") {
                gross += wt; fine += itemFine; statusCounts[o.status]++;
                if(!pC[o.party]) pC[o.party] = { p: 0, g: 0, f: 0 };
                pC[o.party].p++; pC[o.party].g += wt; pC[o.party].f += itemFine;
            }
        });
        document.getElementById('totalHandWt').innerText = gross.toFixed(3);
        document.getElementById('totalFineHand').innerText = fine.toFixed(3);
        let grid = ""; Object.keys(statusCounts).forEach(s => { grid += `<div class="dash-item"><span class="dash-count">${statusCounts[s]}</span><span class="dash-label">${s}</span></div>`; });
        document.getElementById('statusCounts').innerHTML = grid;
        let tb = ""; Object.keys(pC).forEach(p => { tb += `<tr style="border-bottom:1px solid #eee;"><td style="padding:8px;">${p}</td><td>${pC[p].p}</td><td>${pC[p].g.toFixed(2)}</td><td>${pC[p].f.toFixed(2)}</td></tr>`; });
        document.getElementById('partyStatsBody').innerHTML = tb;
    }

    function renderLists(data) {
        const pL = document.getElementById('prodList'); const aL = document.getElementById('activeList'); const pastL = document.getElementById('pastList');
        pL.innerHTML = ""; aL.innerHTML = ""; pastL.innerHTML = "";
        data.forEach(o => {
            const html = `<div class="card"><div style="display:flex; gap:12px;"><img src="${o.imgs[0]}" style="width:65px; height:65px; object-fit:cover; border-radius:8px;"><div><b>${o.id}</b> | <span style="color:var(--gold)">${o.status}</span><br><small>${o.party}</small></div></div><div style="display:flex; gap:5px;"><button class="btn btn-out" style="flex:1" onclick="moveNext('${o.id}', '${o.status}')">NEXT</button><button class="btn btn-out" style="flex:1; color:green; border-color:green;" onclick="downloadForm('${o.id}')">FORM</button></div></div>`;
            if(o.status === "READY") pastL.innerHTML += html;
            else { pL.innerHTML += html; aL.innerHTML += html; }
        });
    }

    function moveNext(id, cur) { const idx = depts.indexOf(cur); if(idx < depts.length - 1) db.ref('orders/' + id).update({ status: depts[idx + 1] }); }

    function downloadForm(id) {
        const o = window.fullData.find(x => x.id === id);
        document.getElementById('c_wt').innerText = o.weight + " gms";
        document.getElementById('c_kt').innerText = o.kt + " KT";
        document.getElementById('c_sz').innerText = o.size;
        document.getElementById('c_cad').innerText = o.cadWorker;
        document.getElementById('c_sp').innerText = o.specs;
        document.getElementById('c_imgs').innerHTML = o.imgs.map(i => `<img src="${i}">`).join('');
        setTimeout(() => { html2canvas(document.querySelector("#formCanvas"), { scale: 2 }).then(canvas => {
            const img = canvas.toDataURL("image/jpeg", 0.9);
            const w = window.open(); w.document.write(`<img src="${img}" style="width:100%;">`);
        }); }, 500);
    }

    function nav(p, el) {
        document.querySelectorAll('.page, .tab').forEach(x => x.classList.remove('active'));
        document.getElementById(p + 'Page').classList.add('active');
        el.classList.add('active');
        if(p !== 'dash') lockDashboard();
    }
</script>
</body>
</html>
