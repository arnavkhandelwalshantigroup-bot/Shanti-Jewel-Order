<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shanti Jewel Portal</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { --gold: #D4AF37; --brown: #5d4037; }
        body { font-family: sans-serif; background: #f4f7f6; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 400px; border-top: 8px solid var(--gold); }
        h2 { color: var(--brown); margin-bottom: 5px; }
        input { width: 100%; padding: 15px; margin: 10px 0; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        .btn { width: 100%; padding: 20px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 18px; background: var(--gold); color: white; }
        #successScreen { display: none; text-align: center; }
    </style>
</head>
<body>

<div class="card" id="formArea">
    <h2>SHANTI JEWEL</h2>
    <p style="color: #666; font-size: 14px;">MUMBAI SERVER: <span style="color: green; font-weight: bold;">CONNECTED</span></p>
    
    <input type="text" id="orderNum" placeholder="Order Number">
    <input type="number" step="0.01" id="orderWt" placeholder="Weight (Grams)">
    
    <button type="button" class="btn" onclick="punchOrder()">PUNCH IN</button>
</div>

<div class="card" id="successScreen">
    <h1 style="color: green;">✅ SAVED</h1>
    <p>Order is now in the PRODUCTION list.</p>
    <button class="btn" onclick="location.reload()">NEXT ORDER</button>
</div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyBnvmQBPkJmJcjXf71vEUY91B2_2P9oAgU",
    authDomain: "shanti-jewel-order.firebaseapp.com",
    projectId: "shanti-jewel-order",
    databaseURL: "https://shanti-jewel-order-default-rtdb.firebaseio.com/"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

async function punchOrder() {
    const id = document.getElementById('orderNum').value;
    const wt = document.getElementById('orderWt').value;
    
    if(!id || !wt) return alert("Fill Order # and Weight");

    const btn = document.querySelector('.btn');
    btn.innerText = "SAVING...";
    btn.style.opacity = "0.5";
    btn.disabled = true;

    try {
        // Saving to the 'PRODUCTION' tab as per your instruction
        await db.ref('orders/' + id).set({
            id: id,
            weight: wt,
            status: "PRODUCTION",
            timestamp: Date.now()
        });

        // Hide the input and show Success without reloading
        document.getElementById('formArea').style.display = 'none';
        document.getElementById('successScreen').style.display = 'block';

    } catch (err) {
        alert("CRITICAL ERROR: " + err.message);
        btn.innerText = "TRY AGAIN";
        btn.disabled = false;
        btn.style.opacity = "1";
    }
}
</script>

</body>
</html>
