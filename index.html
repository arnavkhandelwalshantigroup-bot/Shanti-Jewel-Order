<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shanti Jewel Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- Firebase Compatibility Libraries -->
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-storage-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        :root { --gold: #D4AF37; --brown: #5d4037; --bg: #f4f7f6; --red: #d32f2f; --grey: #e0e0e0; }
        body { font-family: 'Montserrat', sans-serif; background: var(--bg); margin: 0; padding-bottom: 90px; color: #333; }
        
        /* High-Res Upload Loader */
        #uploadOverlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.95); z-index: 10002; flex-direction: column; 
            justify-content: center; align-items: center; color: white;
        }
        .progress-container { width: 80%; background: #444; border-radius: 10px; height: 12px; margin-top: 15px; overflow: hidden; border: 1px solid var(--gold); }
        .progress-bar { width: 0%; height: 100%; background: var(--gold); transition: width 0.3s; }

        #loginOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--brown); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; }
        .login-box { background: white; padding: 30px; border-radius: 15px; width: 80%; max-width: 300px; text-align: center; border-bottom: 5px solid var(--gold); color: #333; }
        .login-box input { width: 100%; padding: 12px; border: 2px solid #ddd; text-align: center; letter-spacing: 8px; font-size: 24px; border-radius: 8px; box-sizing: border-box; }
        .header { background: var(--brown); color: white; text-align: center; padding: 10px; border-bottom: 3px solid var(--gold); }
        .logo-text { font-size: 22px; font-weight: bold; letter-spacing: 2px; margin: 0; }
        .sub-header { font-size: 10px; letter-spacing: 4px; color: var(--gold); }
        .page { display: none; padding: 15px; }
        .page.active { display: block; }
        .card { background: white; padding: 15px; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border: 1px solid #eee; position: relative; }
        input, select, textarea { width: 100%; padding: 14px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .btn { padding: 15px; border: none; border-radius: 8px; font-weight: bold; width: 100%; cursor: pointer; text-transform: uppercase; }
        .btn-gold { background: var(--gold); color: white; }
        .tab-bar { position: fixed; bottom: 0; width: 100%; background: white; display: flex; border-top: 1px solid #ddd; height: 75px; z-index: 1000; }
        .tab { flex: 1; text-align: center; padding: 25px 5px; font-size: 8px; color: #999; font-weight: bold; text-transform: uppercase; display: flex; align-items: center; justify-content: center; }
        .tab.active { color: var(--brown); border-top: 4px solid var(--gold); background: #fffcf5; }
        .photo-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        .photo-box { height: 100px; background: #f9f9f9; border: 2px dashed #ddd; display: flex; align-items: center; justify-content: center; font-size: 10px; color: #aaa; border-radius: 8px; overflow: hidden; }
        .photo-box img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

<div id="uploadOverlay">
    <h2 style="color:var(--gold); letter-spacing: 2px;">SHANTI JEWEL</h2>
    <p id="uploadStatus">UPLOADING HIGH-RES DESIGN...</p>
    <div class="progress-container"><div id="uploadBar" class="progress-bar"></div></div>
</div>

<div id="loginOverlay"><div class="login-box"><h2 style="margin:0 0 20px 0;">SHANTI JEWEL</h2><input type="password" id="passInput" placeholder="••••" maxlength="4"><button class="btn btn-gold" style="margin-top:20px;" onclick="checkPass()">ENTER APP</button></div></div>
<div class="header"><div class="logo-text">SHANTI JEWEL</div><div class="sub-header">ORDER PORTAL</div></div>

<div id="punchPage" class="page active">
    <div class="card">
        <div class="photo-grid">
            <div class="photo-box" id="p1" onclick="document.getElementById('f1').click()">+ PHOTO 1</div>
            <div class="photo-box" id="p2" onclick="document.getElementById('f2').click()">+ PHOTO 2</div>
            <div class="photo-box" id="p3" onclick="document.getElementById('f3').click()">+ PHOTO 3</div>
            <div class="photo-box" id="p4" onclick="document.getElementById('f4').click()">+ PHOTO 4</div>
        </div>
        <input type="file" id="f1" accept="image/*" style="display:none" onchange="handleSingle(this,'p1',0)">
        <input type="file" id="f2" accept="image/*" style="display:none" onchange="handleSingle(this,'p2',1)">
        <input type="file" id="f3" accept="image/*" style="display:none" onchange="handleSingle(this,'p3',2)">
        <input type="file" id="f4" accept="image/*" style="display:none" onchange="handleSingle(this,'p4',3)">
        
        <input type="text" id="i_id" placeholder="Order Number">
        <select id="i_kt">
            <option value="23">23KT Gold</option>
            <option value="22">22KT Gold</option>
            <option value="18">18KT Gold</option>
            <option value="9">9KT Gold</option>
        </select>
        <input type="number" step="0.001" id="i_wt" placeholder="Weight (gms)">
        <input type="date" id="i_dd">
        <textarea id="i_sp" rows="3" placeholder="Design Instructions"></textarea>
        <button class="btn btn-gold" onclick="saveOrder()">SAVE & PROCESS</button>
    </div>
</div>

<div id="productionPage" class="page"><div id="prodList"></div></div>
<div id="activePage" class="page"><div id="activeList"></div></div>

<div class="tab-bar">
    <div class="tab active" onclick="nav('punch',this)">PUNCH IN</div>
    <div class="tab" onclick="nav('production',this)">PRODUCTION</div>
    <div class="tab" onclick="nav('active',this)">ACTIVE</div>
</div>

<script>
// PRE-FILLED CONFIG FOR SHANTI JEWEL
const firebaseConfig = {
    apiKey: "AIzaSyBnvmQBPkJmJcjXf71vEUY91B2_2P9oAgU",
    authDomain: "shanti-jewel-order.firebaseapp.com",
    projectId: "shanti-jewel-order",
    databaseURL: "https://shanti-jewel-order-default-rtdb.firebaseio.com/",
    storageBucket: "shanti-jewel-order.appspot.com"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const storage = firebase.storage();
let photoFiles = [null, null, null, null];

function checkPass(){ if(document.getElementById('passInput').value==='1008') document.getElementById('loginOverlay').style.display='none'; }

function handleSingle(input, pId, idx){
    const file = input.files[0];
    if(!file) return;
    photoFiles[idx] = file;
    document.getElementById(pId).innerHTML = `<img src="${URL.createObjectURL(file)}">`;
}

async function saveOrder(){
    const id = document.getElementById('i_id').value;
    if(!id) return alert("Order ID required");

    document.getElementById('uploadOverlay').style.display = 'flex';
    let uploadedUrls = [];

    try {
        for(let i=0; i < photoFiles.length; i++) {
            if(photoFiles[i]) {
                const ref = storage.ref(`designs/${id}/img_${i}.jpg`);
                const snap = await ref.put(photoFiles[i]);
                const url = await snap.ref.getDownloadURL();
                uploadedUrls.push(url);
                document.getElementById('uploadBar').style.width = ((i+1)/photoFiles.length * 100) + "%";
            }
        }

        await db.ref('orders/'+id).set({
            id: id,
            weight: document.getElementById('i_wt').value,
            kt: document.getElementById('i_kt').value,
            deliveryDate: document.getElementById('i_dd').value,
            status: "CAD",
            imgs: uploadedUrls,
            specs: document.getElementById('i_sp').value,
            ts: Date.now()
        });

        alert("Order Saved!");
        location.reload();
    } catch (e) {
        alert("Error: " + e.message);
        document.getElementById('uploadOverlay').style.display = 'none';
    }
}

function nav(p,el){ 
    document.querySelectorAll('.page, .tab').forEach(x=>x.classList.remove('active'));
    document.getElementById(p+'Page').classList.add('active');
    el.classList.add('active');
}
</script>
</body>
</html>
