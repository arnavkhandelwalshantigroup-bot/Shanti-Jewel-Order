<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shanti Jewel Order Portal</title>
    <!-- Elegant Fonts for Bespoke Look -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;1,500&family=Montserrat:wght@300;600&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --gold: #D4AF37; --brown: #5d4037; --bg: #f4f7f6; --red: #d32f2f; --grey: #e0e0e0; }
        body { font-family: 'Montserrat', sans-serif; background: var(--bg); margin: 0; padding-bottom: 90px; color: #333; }
        
        /* ... Existing Styles (Login, Header, Tabs) ... */
        #loginOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--brown); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; }
        .login-box { background: white; padding: 30px; border-radius: 15px; width: 80%; max-width: 300px; text-align: center; border-bottom: 5px solid var(--gold); }
        .login-box input { width: 100%; padding: 12px; border: 2px solid #ddd; text-align: center; letter-spacing: 8px; font-size: 24px; color: var(--brown); border-radius: 8px; box-sizing: border-box; }
        .header { background: var(--brown); color: white; text-align: center; padding: 10px; border-bottom: 3px solid var(--gold); }
        .logo-text { font-size: 22px; font-weight: bold; letter-spacing: 2px; margin: 0; }
        .sub-header { font-size: 10px; letter-spacing: 4px; color: var(--gold); }
        .shree-text { font-size: 14px; color: var(--gold); margin-bottom: 2px; display: block; }
        .page { display: none; padding: 15px; }
        .page.active { display: block; }
        .card { background: white; padding: 15px; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border: 1px solid #eee; position: relative; }
        
        /* Timeline Tracker Styles */
        .timeline-container { margin: 20px 0 10px 0; position: relative; display: flex; justify-content: space-between; align-items: center; }
        .timeline-line { position: absolute; top: 50%; left: 0; height: 2px; background: var(--grey); width: 100%; transform: translateY(-50%); z-index: 1; }
        .timeline-progress { position: absolute; top: 50%; left: 0; height: 2px; background: var(--gold); transition: width 0.4s ease; z-index: 2; }
        .step { width: 12px; height: 12px; border-radius: 50%; background: var(--grey); border: 2px solid white; z-index: 3; position: relative; }
        .step.done { background: var(--gold); }
        .step-label { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); font-size: 7px; color: #999; font-weight: bold; }
        
        /* BESPOKE CANVAS STYLING */
        #formCanvas { background: white; width: 650px; padding: 40px; position: fixed; left: -5000px; border: 15px solid var(--gold); box-sizing: border-box; }
        .canvas-header { text-align: center; border-bottom: 2px solid var(--gold); padding-bottom: 20px; margin-bottom: 25px; }
        .canvas-logo { font-family: 'Montserrat', sans-serif; font-size: 45px; font-weight: 600; color: var(--brown); letter-spacing: 8px; margin: 0; }
        .canvas-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .canvas-table td { padding: 18px 0; border-bottom: 1px solid #eee; }
        .label-text { font-family: 'Montserrat', sans-serif; font-size: 14px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        .detail-text { font-family: 'Playfair Display', serif; font-size: 28px; color: var(--brown); font-style: italic; }

        /* ... Navigation & Form Elements ... */
        .tab-bar { position: fixed; bottom: 0; width: 100%; background: white; display: flex; border-top: 1px solid #ddd; height: 75px; z-index: 1000; }
        .tab { flex: 1; text-align: center; padding: 25px 5px; font-size: 8px; color: #999; font-weight: bold; text-transform: uppercase; display: flex; align-items: center; justify-content: center; }
        .tab.active { color: var(--brown); border-top: 4px solid var(--brown); background: #fffcf5; }
        .btn { padding: 15px; border: none; border-radius: 8px; font-weight: bold; width: 100%; cursor: pointer; }
        .btn-gold { background: var(--gold); color: white; }
        .btn-out { background: none; border: 1px solid var(--gold); color: var(--gold); margin-top: 8px; font-size: 12px; }
        .photo-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        .photo-box { height: 100px; background: #f9f9f9; border: 2px dashed #ddd; display: flex; align-items: center; justify-content: center; font-size: 10px; color: #aaa; border-radius: 8px; overflow: hidden; }
        .photo-box img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

<!-- Login Overlay -->
<div id="loginOverlay">
    <div class="login-box">
        <span style="color:var(--gold); font-weight:bold; display:block; margin-bottom:10px;">IIश्रीII</span>
        <h2 style="color:var(--brown)">PORTAL LOGIN</h2>
        <input type="password" id="passInput" placeholder="••••" maxlength="4">
        <button class="btn btn-gold" style="margin-top:20px;" onclick="checkPass()">ENTER</button>
    </div>
</div>

<div class="header">
    <span class="shree-text">IIश्रीII</span>
    <div class="logo-text">SHANTI JEWEL</div>
    <div class="sub-header">BESPOKE ORDER SYSTEM</div>
</div>

<!-- Main Pages -->
<div id="punchPage" class="page active">
    <div class="card">
        <div class="photo-grid">
            <div class="photo-box" id="p1" onclick="document.getElementById('f1').click()">+ PHOTO 1</div>
            <div class="photo-box" id="p2" onclick="document.getElementById('f2').click()">+ PHOTO 2</div>
        </div>
        <input type="file" id="f1" accept="image/*" style="display:none" onchange="handleSingle(this, 'p1', 0)">
        <input type="file" id="f2" accept="image/*" style="display:none" onchange="handleSingle(this, 'p2', 1)">
        
        <input type="text" id="i_id" placeholder="Order Number (e.g. SJ-101)">
        <select id="i_pa">
            <option value="">Select Party Name</option>
            <option value="P.N.GADGIL & SONS LTD.">P.N.GADGIL & SONS LTD.</option>
            <option value="PNGS Reva Diamond Jewellery Ltd">PNGS Reva Diamond Jewellery Ltd</option>
            <option value="NEELKANTH JEWELLERS">NEELKANTH JEWELLERS</option>
            <option value="INHOUSE">INHOUSE</option>
        </select>
        <div style="display:flex; gap:10px;">
            <select id="i_kt">
                <option value="22">22KT</option>
                <option value="18">18KT</option>
                <option value="14">14KT</option>
                <option value="9">9KT</option>
            </select>
            <input type="number" step="0.001" id="i_wt" placeholder="Weight (gms)">
        </div>
        <select id="i_cad">
            <option value="">CAD Designer</option>
            <option value="DYE">DYE</option>
            <option value="SHINDE">SHINDE</option>
        </select>
        <textarea id="i_sp" rows="3" placeholder="Special Instructions..."></textarea>
        <button class="btn btn-gold" onclick="saveOrder()">PROCESS ORDER</button>
    </div>
</div>

<div id="activePage" class="page"><div id="activeList"></div></div>
<div id="pastPage" class="page"><div id="pastList"></div></div>

<!-- Hidden Canvas for Form Generation -->
<div id="formCanvas">
    <div class="canvas-header">
        <span style="font-size:18px; color:var(--gold); letter-spacing:3px;">IIश्रीII</span>
        <div class="canvas-logo">SHANTI JEWEL</div>
    </div>
    <div id="c_imgs" style="display:grid; grid-template-columns: 1fr 1fr; gap:15px; margin-bottom:20px;"></div>
    <table class="canvas-table">
        <tr>
            <td class="label-text">Order ID</td>
            <td id="c_id" class="detail-text"></td>
        </tr>
        <tr>
            <td class="label-text">Gross Weight</td>
            <td id="c_wt" class="detail-text"></td>
        </tr>
        <tr>
            <td class="label-text">Gold Purity</td>
            <td id="c_kt" class="detail-text"></td>
        </tr>
        <tr>
            <td class="label-text">CAD Designer</td>
            <td id="c_cad" class="detail-text"></td>
        </tr>
        <tr>
            <td class="label-text">Instructions</td>
            <td id="c_sp" class="detail-text" style="font-size: 20px;"></td>
        </tr>
    </table>
</div>

<div class="tab-bar">
    <div class="tab active" onclick="nav('punch', this)">PUNCH IN</div>
    <div class="tab" onclick="nav('active', this)">PRODUCTION</div>
    <div class="tab" onclick="nav('past', this)">HISTORY</div>
</div>

<script>
    // Initialize Firebase (Using your existing config)
    const firebaseConfig = { apiKey: "AIzaSyBnvmQBPkJmJcjXf71vEUY91B2_2P9oAgU", authDomain: "shanti-jewel-order.firebaseapp.com", projectId: "shanti-jewel-order", databaseURL: "https://shanti-jewel-order-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const depts = ["CAD", "CAM", "CASTING", "POLISH", "HUID", "READY"];
    let photoData = [null, null];

    function checkPass() { if(document.getElementById('passInput').value === '1008') document.getElementById('loginOverlay').style.display = 'none'; loadOrders(); }

    function handleSingle(input, pId, idx) {
        const reader = new FileReader();
        reader.onload = (e) => {
            photoData[idx] = e.target.result;
            document.getElementById(pId).innerHTML = `<img src="${e.target.result}">`;
        };
        reader.readAsDataURL(input.files[0]);
    }

    function saveOrder() {
        const id = document.getElementById('i_id').value;
        if(!id || !photoData[0]) return alert("ID & Main Photo Required");
        db.ref('orders/' + id).set({
            id: id, party: document.getElementById('i_pa').value,
            weight: document.getElementById('i_wt').value,
            kt: document.getElementById('i_kt').value,
            status: "CAD", ts: Date.now(), imgs: photoData.filter(p => p !== null),
            cadWorker: document.getElementById('i_cad').value,
            specs: document.getElementById('i_sp').value
        }).then(() => location.reload());
    }

    function loadOrders() {
        db.ref('orders').on('value', s => {
            const data = Object.values(s.val() || {}).sort((a,b) => b.ts - a.ts);
            window.fullData = data;
            renderLists(data);
        });
    }

    function generateTimeline(currentStatus) {
        const currentIndex = depts.indexOf(currentStatus);
        const progressWidth = (currentIndex / (depts.length - 1)) * 100;
        let stepsHtml = "";
        depts.forEach((d, i) => {
            const isDone = i <= currentIndex ? "done" : "";
            stepsHtml += `<div class="step ${isDone}"><span class="step-label">${d}</span></div>`;
        });
        return `<div class="timeline-container"><div class="timeline-line"></div><div class="timeline-progress" style="width: ${progressWidth}%"></div>${stepsHtml}</div>`;
    }

    function renderLists(data) {
        const aL = document.getElementById('activeList'); const pL = document.getElementById('pastList');
        aL.innerHTML = ""; pL.innerHTML = "";
        data.forEach(o => {
            const html = `
                <div class="card">
                    <div style="display:flex; gap:12px; align-items:center;">
                        <img src="${o.imgs[0]}" style="width:60px; height:60px; border-radius:8px; object-fit:cover;">
                        <div><b>${o.id}</b><br><small>${o.party}</small></div>
                    </div>
                    ${generateTimeline(o.status)}
                    <div style="display:flex; gap:8px; margin-top:10px;">
                        <button class="btn btn-out" style="flex:1" onclick="moveNext('${o.id}', '${o.status}')">NEXT PROCESS</button>
                        <button class="btn btn-out" style="flex:1; color:green; border-color:green;" onclick="generateForm('${o.id}')">SHARE FORM</button>
                    </div>
                </div>`;
            if(o.status === "READY") pL.innerHTML += html; else aL.innerHTML += html;
        });
    }

    function moveNext(id, cur) {
        const idx = depts.indexOf(cur);
        if(idx < depts.length - 1) {
            // CONFIRMATION TO REDUCE RISK OF ERROR
            if(confirm(`Move Order #${id} to ${depts[idx+1]}?`)) {
                db.ref('orders/' + id).update({ status: depts[idx+1] });
            }
        }
    }

    function generateForm(id) {
        const o = window.fullData.find(x => x.id === id);
        document.getElementById('c_id').innerText = o.id;
        document.getElementById('c_wt').innerText = o.weight + " GMS";
        document.getElementById('c_kt').innerText = o.kt + " KT";
        document.getElementById('c_cad').innerText = o.cadWorker;
        document.getElementById('c_sp').innerText = o.specs || "No specific instructions";
        document.getElementById('c_imgs').innerHTML = o.imgs.map(i => `<img src="${i}" style="width:100%; height:200px; object-fit:cover; border-radius:10px;">`).join('');

        setTimeout(() => {
            html2canvas(document.querySelector("#formCanvas"), { scale: 2 }).then(async canvas => {
                const blob = await new Promise(res => canvas.toBlob(res, 'image/jpeg', 0.95));
                const file = new File([blob], `Order_${o.id}.jpg`, { type: 'image/jpeg' });

                // MODERN SHARING LOGIC
                if (navigator.share && navigator.canShare({ files: [file] })) {
                    try {
                        await navigator.share({
                            files: [file],
                            title: 'Shanti Jewel Order Form',
                            text: `Order Details for ${o.id}`
                        });
                    } catch (err) {
                        console.error("Share failed", err);
                    }
                } else {
                    // Fallback for older browsers
                    const link = document.createElement('a');
                    link.download = `Order_${o.id}.jpg`;
                    link.href = canvas.toDataURL();
                    link.click();
                }
            });
        }, 500);
    }

    function nav(p, el) {
        document.querySelectorAll('.page, .tab').forEach(x => x.classList.remove('active'));
        document.getElementById(p + 'Page').classList.add('active');
        el.classList.add('active');
    }
</script>
</body>
</html>
