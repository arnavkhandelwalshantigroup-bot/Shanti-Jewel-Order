<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shanti Jewel Master Portal</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { --gold: #D4AF37; --brown: #5d4037; --bg: #f4f7f6; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding-bottom: 80px; }
        .header { background: var(--brown); color: white; text-align: center; padding: 15px; border-bottom: 3px solid var(--gold); font-weight: bold; position: sticky; top: 0; z-index: 100; }
        
        /* Tab Logic */
        .tab-content { display: none; padding: 15px; }
        .active-tab { display: block; }
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: var(--brown); display: flex; justify-content: space-around; padding: 12px 0; border-top: 2px solid var(--gold); z-index: 1000; }
        .nav-item { color: white; font-size: 10px; text-align: center; opacity: 0.6; flex: 1; cursor: pointer; }
        .nav-item.active { opacity: 1; color: var(--gold); font-weight: bold; }

        /* Form & Cards */
        .card { background: white; padding: 15px; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border-left: 5px solid var(--gold); }
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .btn-gold { width: 100%; padding: 15px; background: var(--gold); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        
        /* Timeline */
        .timeline-item { border-left: 3px solid var(--gold); margin-left: 10px; padding-left: 15px; position: relative; margin-bottom: 15px; }
        .timeline-item::before { content: ''; position: absolute; left: -8px; top: 0; width: 12px; height: 12px; background: var(--gold); border-radius: 50%; }
    </style>
</head>
<body>

<!-- ALL THING LOCK (1008) -->
<div id="authOverlay" style="position:fixed; top:0; left:0; width:100%; height:100%; background:var(--brown); z-index:2000; display:flex; flex-direction:column; justify-content:center; align-items:center; color:white;">
    <h2 style="color:var(--gold);">SHANTI JEWEL LOGIN</h2>
    <input type="password" id="pinInput" placeholder="ENTER PIN" style="width:60%; text-align:center; color: black;">
    <button class="btn-gold" style="width:60%; margin-top:10px;" onclick="checkPin()">UNLOCK SYSTEM</button>
</div>

<div class="header">SHANTI JEWEL MANAGEMENT</div>

<!-- PUNCH IN TAB -->
<div id="punch" class="tab-content active-tab">
    <div class="card">
        <h3 style="margin-top:0;">ORDER PUNCH IN</h3>
        <input type="text" id="orderId" placeholder="Order Number">
        <input type="number" step="0.01" id="weight" placeholder="Weight (Grams)">
        
        <label>CAD Designer:</label>
        <select id="cadDesigner">
            <option value="None">Select Designer</option>
            <option value="Designer_1">Designer 1</option>
            <option value="Designer_2">Designer 2</option>
        </select>

        <label>Party Name:</label>
        <select id="partyName">
            <option value="None">Select Party</option>
            <option value="Party_A">Party A</option>
            <option value="Party_B">Party B</option>
        </select>

        <textarea id="notes" placeholder="Instructions (Temple Looks, No Stones)"></textarea>
        <button class="btn-gold" id="saveBtn" onclick="saveOrder()">PUNCH IN ORDER</button>
    </div>
</div>

<!-- PRODUCTION TIMELINE TAB -->
<div id="production" class="tab-content">
    <h3 style="margin-top:0;">PRODUCTION TIMELINE</h3>
    <div id="timelineContainer">Loading...</div>
</div>

<!-- PAST ORDERS TAB -->
<div id="past" class="tab-content">
    <h3 style="margin-top:0;">PAST ORDERS</h3>
    <div id="pastContainer">No completed orders.</div>
</div>

<!-- DASHBOARD TAB -->
<div id="dashboard" class="tab-content">
    <div class="card" style="text-align:center;">
        <h3>DASHBOARD</h3>
        <p>Total Production Weight: <span id="dashTotal" style="color:var(--gold); font-size:22px; font-weight:bold;">0.00</span>g</p>
        <hr>
        <button class="btn-gold" style="background:red;" onclick="wipeOut()">WIPEOUT MEMORY</button>
    </div>
</div>

<!-- NAVIGATION -->
<div class="nav-bar">
    <div class="nav-item active" onclick="showTab('punch', this)">PUNCH</div>
    <div class="nav-item" onclick="showTab('production', this)">PRODUCTION</div>
    <div class="nav-item" onclick="showTab('past', this)">PAST</div>
    <div class="nav-item" onclick="showTab('dashboard', this)">DASHBOARD</div>
</div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyBnvmQBPkJmJcjXf71vEUY91B2_2P9oAgU",
    authDomain: "shanti-jewel-order.firebaseapp.com",
    projectId: "shanti-jewel-order",
    databaseURL: "https://shanti-jewel-order-default-rtdb.firebaseio.com/"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

function checkPin() {
    if(document.getElementById('pinInput').value === "1008") {
        document.getElementById('authOverlay').style.display = 'none';
    } else { alert("ACCESS DENIED"); }
}

function showTab(tabId, el) {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active-tab'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.getElementById(tabId).classList.add('active-tab');
    el.classList.add('active');
}

async function saveOrder() {
    const id = document.getElementById('orderId').value;
    const wt = document.getElementById('weight').value;
    if(!id || !wt) return alert("Fill Order ID and Weight");

    const btn = document.getElementById('saveBtn');
    btn.innerText = "UPLOADING...";
    btn.disabled = true;

    try {
        await db.ref('orders/' + id).set({
            id: id,
            weight: parseFloat(wt),
            cad: document.getElementById('cadDesigner').value,
            party: document.getElementById('partyName').value,
            specs: document.getElementById('notes').value,
            status: "PRODUCTION",
            timestamp: Date.now()
        });
        alert("SUCCESS: ORDER #" + id + " SAVED");
        document.getElementById('orderId').value = "";
        document.getElementById('weight').value = "";
    } catch(e) { alert("Error: " + e.message); }
    btn.innerText = "PUNCH IN ORDER";
    btn.disabled = false;
}

db.ref('orders').on('value', snap => {
    const timeline = document.getElementById('timelineContainer');
    const dashTotal = document.getElementById('dashTotal');
    timeline.innerHTML = "";
    let totalWt = 0;

    snap.forEach(child => {
        const o = child.val();
        totalWt += o.weight;
        timeline.innerHTML += `
            <div class="timeline-item">
                <div class="card">
                    <b>ORDER #${o.id}</b> | <span style="color:var(--gold);">${o.weight}g</span><br>
                    <small>CAD: ${o.cad} | Party: ${o.party}</small>
                </div>
            </div>`;
    });
    dashTotal.innerText = totalWt.toFixed(2);
});

function wipeOut() {
    if(confirm("WIPEOUT ALL DATA?")) {
        db.ref('orders').remove();
    }
}
</script>
</body>
</html>
